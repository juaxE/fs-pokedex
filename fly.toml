# fly.toml app configuration file generated for fs-pokedex-lustrous-lagoon-2049 on 2026-06-27T18:17:39+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fs-pokedex-lustrous-lagoon-2049'
primary_region = 'arn'

[build]

[deploy]
  strategy = "canary"

[env]
  PORT="5001"

[processes]
  app = "node app.js"

[http_service]
  internal_port = 5001 # ensure that this is same as above!
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
