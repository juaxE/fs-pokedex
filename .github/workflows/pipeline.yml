name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies 
        run: npm install  
      - name: Check style        
        run: npm run eslint
      - name: Run npm test        
        run: npm run test
      - name: Run npm build        
        run: npm run build
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npm run test:e2e
  deploy:
      runs-on: ubuntu-latest
      needs: [build_and_test]
      steps:
        - uses: actions/checkout@v6
        - uses: actions/setup-node@v6
          with:
            node-version: '24'
        - uses: superfly/flyctl-actions/setup-flyctl@master
        - name: Deploy proxy
          run: flyctl deploy --remote-only
          env:
            FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          if: ${{ github.event_name == 'push' }}

  notify_success:
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Deployment succesful
        uses: sarisia/actions-status-discord@v1
        if: ${{ success() && github.event_name == 'push' }}
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          description: |
            **Commit:** ${{ github.sha }}
            **Message:** `${{ github.event.head_commit.message }}`
            **Author:** `${{ github.event.head_commit.author.name }}`
  notify_failure:
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - name: Build failure notification
        uses: sarisia/actions-status-discord@v1
        if: ${{ failure() }}
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "Build failure!"
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.head_ref || github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Message:** `${{ github.event.pull_request.title || github.event.head_commit.message }}`
            **Author:** `${{ github.event.pull_request.user.login || github.event.head_commit.author.name }}`
            **Workflow:** ${{ github.workflow }}
            **Job:** ${{ github.job }}

            [View commit](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          color: 0xFF0000
  tag_release:
    if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message), '#skip')}}  
    needs: [deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
